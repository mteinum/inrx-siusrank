name: Build and release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  DOTNET_VERSION: "8.0.x"
  SOLUTION_PATH: InrxToSiusRank/InrxToSiusRank.sln
  PROJECT_PATH: InrxToSiusRank/src/InrxToSiusRank/InrxToSiusRank.csproj
  DESKTOP_PROJECT_PATH: InrxToSiusRank/src/InrxToSiusRank.Desktop/InrxToSiusRank.Desktop.csproj

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore "${{ env.SOLUTION_PATH }}"

      - name: Test
        run: dotnet test "${{ env.SOLUTION_PATH }}" --configuration Release --no-restore

  build:
    name: Build ${{ matrix.rid }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - osx-x64
          - osx-arm64
          - linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Publish
        run: |
          dotnet publish "${{ env.PROJECT_PATH }}" \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            --output "publish/cli/${{ matrix.rid }}" \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true

          dotnet publish "${{ env.DESKTOP_PROJECT_PATH }}" \
            --configuration Release \
            --runtime "${{ matrix.rid }}" \
            --self-contained true \
            --output "publish/desktop/${{ matrix.rid }}" \
            -p:PublishSingleFile=true \
            -p:EnableCompressionInSingleFile=true

      - name: Package
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.version }}"
          fi

          rid="${{ matrix.rid }}"
          cli_asset_name="InrxToSiusRank-${tag}-${rid}"
          desktop_asset_name="InrxToSiusRank.Desktop-${tag}-${rid}"
          mkdir -p dist

          if [[ "${rid}" == win-* ]]; then
            (cd "publish/cli/${rid}" && zip -r "../../../dist/${cli_asset_name}.zip" .)
            (cd "publish/desktop/${rid}" && zip -r "../../../dist/${desktop_asset_name}.zip" .)
          else
            tar -C "publish/cli/${rid}" -czf "dist/${cli_asset_name}.tar.gz" .
            tar -C "publish/desktop/${rid}" -czf "dist/${desktop_asset_name}.tar.gz" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ inputs.version }}"
          fi

          if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+){1,2}([-+][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must look like v0.1.0 or v0.1.0-beta.1, got '${tag}'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          gh release create "${RELEASE_TAG}" release-assets/* \
            --title "${RELEASE_TAG}" \
            --target "${GITHUB_SHA}" \
            --generate-notes
